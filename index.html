<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FAFAF8" id="theme-color">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default" id="status-bar">
<title>Show Up — Gym Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23E23B2E'/></svg>">
<script>
(function () {
  const t = localStorage.getItem("gym-tracker-theme") || "system";
  const dark = t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme:dark)").matches);
  if (t !== "system") document.documentElement.dataset.theme = t;
  const meta = document.getElementById("theme-color");
  if (meta) meta.content = dark ? "#111214" : "#FAFAF8";
  const bar = document.getElementById("status-bar");
  if (bar) bar.content = dark ? "black-translucent" : "default";
})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&display=swap');
:root { --red:#E23B2E; --ink:#111214; --paper:#FAFAF8; --line:#E4E2DC; --mute:#8A877F; --surface:#fff; }
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) { --ink:#F2F0EB; --paper:#111214; --line:#2E2D2A; --mute:#9A9790; --surface:#1A1B1E; }
}
[data-theme="dark"] { --ink:#F2F0EB; --paper:#111214; --line:#2E2D2A; --mute:#9A9790; --surface:#1A1B1E; }
[data-theme="light"] { --red:#E23B2E; --ink:#111214; --paper:#FAFAF8; --line:#E4E2DC; --mute:#8A877F; --surface:#fff; }
* { box-sizing:border-box; }
body { margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
  font-family:'Inter',system-ui,sans-serif; display:flex; justify-content:center;
  transition:background .2s,color .2s; }
.wrap { width:100%; max-width:430px; padding:28px 20px 48px; }
.topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.topbar h1 { margin-top:0; }
.themebtn { flex-shrink:0; margin-top:4px; background:var(--surface); border:1.5px solid var(--line);
  border-radius:999px; width:40px; height:40px; cursor:pointer; font-size:18px; line-height:1;
  display:flex; align-items:center; justify-content:center; transition:background .2s,border-color .2s; }
.themebtn:focus-visible { outline:2px solid var(--red); outline-offset:2px; }
.eyebrow { font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--mute); font-weight:600; }
h1 { font-family:'Archivo Black','Arial Black',sans-serif; font-size:34px; line-height:1.02;
  text-transform:uppercase; letter-spacing:-.01em; margin:6px 0 2px; }
h1 em { font-style:normal; color:var(--red); }
.stats { display:flex; border-top:3px solid var(--ink); border-bottom:1px solid var(--line); margin-top:20px; }
.stat { flex:1; padding:14px 0 12px; }
.stat + .stat { border-left:1px solid var(--line); padding-left:16px; }
.num { font-family:'Archivo Black',sans-serif; font-size:30px; line-height:1; }
.num.red { color:var(--red); }
.lab { font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--mute); margin-top:4px; font-weight:600; }
.check { margin-top:26px; }
.chips { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
.chip { border:1.5px solid var(--ink); background:transparent; color:var(--ink);
  font:600 12.5px 'Inter',sans-serif; letter-spacing:.04em; padding:7px 13px; border-radius:999px; cursor:pointer;
  transition:background .12s,color .12s; }
.chip.on { background:var(--ink); color:var(--paper); }
.chip:focus-visible { outline:2px solid var(--red); outline-offset:2px; }
.note { width:100%; border:1.5px solid var(--line); border-radius:8px; padding:10px 12px;
  font:400 14px 'Inter',sans-serif; background:var(--surface); color:var(--ink); margin-bottom:12px; }
.note:focus { outline:none; border-color:var(--ink); }
.logbtn { width:100%; background:var(--red); color:#fff; border:none; border-radius:10px;
  font-family:'Archivo Black',sans-serif; font-size:17px; text-transform:uppercase; letter-spacing:.06em;
  padding:16px; cursor:pointer; transition:transform .08s; }
.logbtn:active { transform:scale(.985); }
.logbtn:focus-visible { outline:3px solid var(--ink); outline-offset:2px; }
.done { border:1.5px solid var(--line); border-radius:10px; padding:16px; display:flex;
  align-items:center; justify-content:space-between; background:var(--surface); }
.done b { font-size:15px; }
.done span { display:block; font-size:12.5px; color:var(--mute); margin-top:2px; }
.undo { background:none; border:none; color:var(--mute); font:600 12px 'Inter',sans-serif;
  text-decoration:underline; cursor:pointer; }
.cal { margin-top:34px; }
.calhead { display:flex; align-items:baseline; justify-content:space-between; }
.month { font-family:'Archivo Black',sans-serif; font-size:16px; text-transform:uppercase; }
.nav button { background:var(--surface); color:var(--ink); border:1.5px solid var(--ink); border-radius:6px;
  width:28px; height:28px; font-weight:700; cursor:pointer; margin-left:6px; }
.grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:14px; }
.dow { text-align:center; font-size:10px; font-weight:700; color:var(--mute); letter-spacing:.1em; }
.cell { aspect-ratio:1; border-radius:8px; display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:500; border:1px solid var(--line); background:var(--surface); color:var(--ink); }
.cell.hit { background:var(--red); border-color:var(--red); color:#fff; font-weight:700; }
.cell.today { box-shadow:0 0 0 2px var(--ink); }
.cell.blank { border:none; background:transparent; }
.monthsum { margin-top:12px; font-size:12.5px; color:var(--mute); }
.settings { margin-top:30px; border:1.5px solid var(--line); border-radius:10px; padding:16px; background:var(--surface); }
.settings h2 { font:600 11px 'Inter',sans-serif; letter-spacing:.18em; text-transform:uppercase;
  color:var(--mute); margin:0 0 14px; }
.setting { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.setting + .setting { margin-top:14px; padding-top:14px; border-top:1px solid var(--line); }
.setting label { font:500 14px 'Inter',sans-serif; }
.setting .hint { display:block; font:400 12px 'Inter',sans-serif; color:var(--mute); margin-top:3px; max-width:220px; }
.toggle { position:relative; width:48px; height:28px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; position:absolute; }
.toggle span { position:absolute; inset:0; background:var(--line); border-radius:999px; cursor:pointer; transition:background .2s; }
.toggle span::after { content:""; position:absolute; left:3px; top:3px; width:22px; height:22px;
  background:#fff; border-radius:50%; transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
.toggle input:checked + span { background:var(--red); }
.toggle input:checked + span::after { transform:translateX(20px); }
.toggle input:focus-visible + span { outline:2px solid var(--red); outline-offset:2px; }
.time { border:1.5px solid var(--line); border-radius:8px; padding:8px 10px; font:500 14px 'Inter',sans-serif;
  background:var(--paper); color:var(--ink); }
.time:disabled { opacity:.45; }
.reminder-status { margin-top:10px; font:400 12px 'Inter',sans-serif; color:var(--mute); }
.reminder-status.warn { color:var(--red); }
.toast { position:fixed; left:50%; bottom:28px; transform:translateX(-50%);
  background:var(--ink); color:var(--paper); font:600 13px 'Inter',sans-serif; padding:10px 18px; border-radius:999px;
  opacity:0; pointer-events:none; transition:opacity .2s; }
.toast.show { opacity:1; }
.databar { margin-top:20px; display:flex; gap:14px; }
.databar button { background:none; border:none; color:var(--mute); font:600 11px 'Inter',sans-serif;
  text-decoration:underline; cursor:pointer; padding:0; }
@media (prefers-reduced-motion: reduce) { .logbtn, .toast, body, .toggle span, .toggle span::after { transition:none; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <div class="eyebrow">Daily challenge</div>
      <h1>Show <em>up.</em></h1>
    </div>
    <button class="themebtn" id="theme" aria-label="Toggle theme" title="Toggle theme">◐</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="num red" id="streak">0</div><div class="lab">Day streak</div></div>
    <div class="stat"><div class="num" id="best">0</div><div class="lab">Best streak</div></div>
    <div class="stat"><div class="num" id="total">0</div><div class="lab">Total days</div></div>
  </div>

  <div class="check" id="check"></div>

  <div class="cal">
    <div class="calhead">
      <div class="month" id="monthlabel"></div>
      <div class="nav">
        <button id="prev" aria-label="Previous month">&#8249;</button>
        <button id="next" aria-label="Next month">&#8250;</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="monthsum" id="monthsum"></div>
  </div>

  <div class="settings">
    <h2>Settings</h2>
    <div class="setting">
      <div>
        <label for="reminder">Daily reminder</label>
        <span class="hint">Nudge if you haven't logged by this time</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="reminder">
        <span></span>
      </label>
    </div>
    <div class="setting">
      <div>
        <label for="remindertime">Reminder time</label>
      </div>
      <input class="time" type="time" id="remindertime" value="18:00">
    </div>
    <div class="reminder-status" id="reminder-status"></div>
  </div>

  <div class="databar">
    <button id="export">Export data</button>
    <button id="import">Import data</button>
  </div>
</div>
<div class="toast" id="toast">Logged. Keep the streak alive 🔴</div>

<script>
const KEY = "gym-tracker-log";
const SETTINGS_KEY = "gym-tracker-settings";
const REMINDER_SENT_KEY = "gym-tracker-reminder-sent";
const THEME_KEY = "gym-tracker-theme";
const TYPES = [["push","Push"],["pull","Pull"],["legs","Legs"],["cardio","Cardio"],["full","Full body"],["other","Other"]];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = ["S","M","T","W","T","F","S"];
const pad = n => String(n).padStart(2,"0");
const keyOf = d => d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());

let days = {};
try { days = JSON.parse(localStorage.getItem(KEY) || "{}"); } catch(e) { days = {}; }
let picked = null;
let view = { y: new Date().getFullYear(), m: new Date().getMonth() };
let swReg = null;

const save = () => localStorage.setItem(KEY, JSON.stringify(days));

function getSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}"); }
  catch(e) { return {}; }
}

function saveSettings(s) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}

function isDark() {
  const t = localStorage.getItem(THEME_KEY) || "system";
  if (t === "dark") return true;
  if (t === "light") return false;
  return matchMedia("(prefers-color-scheme:dark)").matches;
}

function applyTheme() {
  const t = localStorage.getItem(THEME_KEY) || "system";
  if (t === "system") delete document.documentElement.dataset.theme;
  else document.documentElement.dataset.theme = t;
  document.getElementById("theme-color").content = isDark() ? "#111214" : "#FAFAF8";
  document.getElementById("status-bar").content = isDark() ? "black-translucent" : "default";
  document.getElementById("theme").textContent = t === "dark" ? "☀" : t === "light" ? "☾" : "◐";
}

function cycleTheme() {
  const order = ["system", "light", "dark"];
  const cur = localStorage.getItem(THEME_KEY) || "system";
  localStorage.setItem(THEME_KEY, order[(order.indexOf(cur) + 1) % order.length]);
  applyTheme();
}

matchMedia("(prefers-color-scheme:dark)").addEventListener("change", () => {
  if ((localStorage.getItem(THEME_KEY) || "system") === "system") applyTheme();
});

function streaks() {
  const set = new Set(Object.keys(days));
  let current = 0;
  const c = new Date();
  if (!set.has(keyOf(c))) c.setDate(c.getDate()-1);
  while (set.has(keyOf(c))) { current++; c.setDate(c.getDate()-1); }
  const sorted = [...set].sort();
  let bestN = 0, run = 0, prev = null;
  for (const k of sorted) {
    const d = new Date(k + "T12:00:00");
    run = (prev && Math.round((d - prev)/86400000) === 1) ? run + 1 : 1;
    if (run > bestN) bestN = run;
    prev = d;
  }
  return { current, best: bestN };
}

function typeLabel(id) {
  const t = TYPES.find(t => t[0] === id);
  return t ? t[1] : "Workout";
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function render() {
  const t = keyOf(new Date());
  const { current, best } = streaks();
  document.getElementById("streak").textContent = current;
  document.getElementById("best").textContent = best;
  document.getElementById("total").textContent = Object.keys(days).length;

  const check = document.getElementById("check");
  if (days[t]) {
    const e = days[t];
    check.innerHTML =
      '<div class="done"><div><b>Today is logged ✓</b><span>' +
      esc(typeLabel(e.type)) + (e.note ? " — " + esc(e.note) : "") +
      '</span></div><button class="undo" id="undo">Undo</button></div>';
    document.getElementById("undo").onclick = () => { delete days[t]; save(); render(); };
  } else {
    check.innerHTML =
      '<div class="chips">' +
      TYPES.map(([id,label]) =>
        '<button class="chip' + (picked===id ? " on" : "") + '" data-t="' + id + '">' + label + '</button>'
      ).join("") +
      '</div>' +
      '<input class="note" id="note" placeholder="Optional note (e.g. bench 185×5)" maxlength="120">' +
      '<button class="logbtn" id="log">Log today\'s workout</button>';
    check.querySelectorAll(".chip").forEach(b => {
      b.onclick = () => { picked = (picked === b.dataset.t) ? null : b.dataset.t; render(); };
    });
    document.getElementById("log").onclick = () => {
      const note = document.getElementById("note").value.trim();
      days[t] = { type: picked || "other", note };
      picked = null;
      save(); render();
      const toast = document.getElementById("toast");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1600);
    };
  }
  renderCal();
}

function renderCal() {
  const first = new Date(view.y, view.m, 1);
  const startDow = first.getDay();
  const dim = new Date(view.y, view.m+1, 0).getDate();
  const now = new Date();
  document.getElementById("monthlabel").textContent = MONTHS[view.m] + " " + view.y;
  let html = DOW.map(d => '<div class="dow">' + d + '</div>').join("");
  for (let i = 0; i < startDow; i++) html += '<div class="cell blank"></div>';
  for (let d = 1; d <= dim; d++) {
    const k = view.y + "-" + pad(view.m+1) + "-" + pad(d);
    const hit = days[k] ? " hit" : "";
    const today = (view.y === now.getFullYear() && view.m === now.getMonth() && d === now.getDate()) ? " today" : "";
    const title = days[k] && days[k].note ? ' title="' + esc(days[k].note) + '"' : "";
    html += '<div class="cell' + hit + today + '"' + title + '>' + d + '</div>';
  }
  document.getElementById("grid").innerHTML = html;
  const prefix = view.y + "-" + pad(view.m+1) + "-";
  const n = Object.keys(days).filter(k => k.startsWith(prefix)).length;
  document.getElementById("monthsum").textContent = n + " workout" + (n === 1 ? "" : "s") + " this month";
}

function updateReminderUI() {
  const s = getSettings();
  const enabled = !!s.reminderEnabled;
  const timeEl = document.getElementById("remindertime");
  document.getElementById("reminder").checked = enabled;
  timeEl.value = s.reminderTime || "18:00";
  timeEl.disabled = !enabled;
  const status = document.getElementById("reminder-status");
  if (!("Notification" in window)) {
    status.textContent = "Notifications aren't supported in this browser.";
    status.className = "reminder-status warn";
    return;
  }
  if (enabled && Notification.permission === "denied") {
    status.textContent = "Notifications blocked — enable them in your browser or phone settings.";
    status.className = "reminder-status warn";
  } else if (enabled && Notification.permission === "granted") {
    status.textContent = "Reminder set for " + formatTime(s.reminderTime || "18:00") + " daily.";
    status.className = "reminder-status";
  } else if (enabled) {
    status.textContent = "Tap the toggle to allow notifications.";
    status.className = "reminder-status";
  } else {
    status.textContent = "";
    status.className = "reminder-status";
  }
}

function formatTime(t) {
  const [h, m] = t.split(":").map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
}

async function requestNotificationPermission() {
  if (!("Notification" in window)) return false;
  if (Notification.permission === "granted") return true;
  if (Notification.permission === "denied") return false;
  return (await Notification.requestPermission()) === "granted";
}

async function showReminderNotification() {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  const opts = {
    body: "Haven't logged today's workout yet. Show up!",
    icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23E23B2E'/></svg>",
    tag: "gym-reminder-" + keyOf(new Date()),
    renotify: true
  };
  if (swReg) await swReg.showNotification("Show Up", opts);
  else new Notification("Show Up", opts);
}

function checkReminder() {
  const s = getSettings();
  if (!s.reminderEnabled || Notification.permission !== "granted") return;
  const today = keyOf(new Date());
  if (days[today]) return;
  const [h, m] = (s.reminderTime || "18:00").split(":").map(Number);
  const now = new Date();
  if (now.getHours() * 60 + now.getMinutes() < h * 60 + m) return;
  if (localStorage.getItem(REMINDER_SENT_KEY) === today) return;
  showReminderNotification();
  localStorage.setItem(REMINDER_SENT_KEY, today);
}

async function initSettings() {
  applyTheme();
  updateReminderUI();

  document.getElementById("theme").onclick = cycleTheme;

  document.getElementById("reminder").onchange = async (e) => {
    const s = getSettings();
    s.reminderEnabled = e.target.checked;
    if (s.reminderEnabled) {
      const ok = await requestNotificationPermission();
      if (!ok) s.reminderEnabled = false;
    }
    saveSettings(s);
    updateReminderUI();
  };

  document.getElementById("remindertime").onchange = (e) => {
    const s = getSettings();
    s.reminderTime = e.target.value;
    saveSettings(s);
    localStorage.removeItem(REMINDER_SENT_KEY);
    updateReminderUI();
  };

  if ("serviceWorker" in navigator) {
    try { swReg = await navigator.serviceWorker.register("sw.js"); } catch(e) {}
  }

  checkReminder();
  setInterval(checkReminder, 60000);
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") checkReminder();
  });
}

document.getElementById("prev").onclick = () => {
  view = view.m === 0 ? { y: view.y-1, m: 11 } : { y: view.y, m: view.m-1 }; renderCal();
};
document.getElementById("next").onclick = () => {
  view = view.m === 11 ? { y: view.y+1, m: 0 } : { y: view.y, m: view.m+1 }; renderCal();
};

document.getElementById("export").onclick = () => {
  const blob = new Blob([JSON.stringify(days, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "gym-log-" + keyOf(new Date()) + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById("import").onclick = () => {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "application/json";
  inp.onchange = () => {
    const f = inp.files[0];
    if (!f) return;
    f.text().then(txt => {
      try {
        const data = JSON.parse(txt);
        days = { ...days, ...data };
        save(); render();
      } catch(e) { alert("That file doesn't look like a valid gym log export."); }
    });
  };
  inp.click();
};

render();
initSettings();
</script>
</body>
</html>
